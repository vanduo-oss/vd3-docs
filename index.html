<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Page title, description, canonical and per-page OG/Twitter tags are
         set per route via unhead (see App.vue) and baked into each SSG page.
         The tags below are invariant across the whole site. -->
    <meta name="author" content="vanduo-oss" />
    <meta
      name="keywords"
      content="Vanduo, design system, CSS framework, Vue 3, components, composables, Fibonacci, design tokens, dark mode, accessibility"
    />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0d1117"
      media="(prefers-color-scheme: dark)"
    />

    <!-- Open Graph / Twitter — invariant tags only -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vanduo" />
    <meta property="og:image" content="https://vanduo.dev/images/og-docs.png" />
    <meta property="og:image:alt" content="Vanduo design system" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:image"
      content="https://vanduo.dev/images/og-docs.png"
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/css/icons/icons-all.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
